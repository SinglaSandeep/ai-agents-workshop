title: Pepsico AI Agents Workshop (L300)
description: Build an end-to-end multi-agent Pepsico business assistant on Azure with Microsoft Foundry, Microsoft Agent Framework, Foundry IQ, Bing Grounding, MCP servers on Container Apps, and Azure Cosmos DB.
theme: just-the-docs

# Enable Mermaid diagrams in just-the-docs.
# Without this, ```mermaid code blocks render as plain code.
mermaid:
  version: "10.9.0"

# GitHub-Pages-safe plugin: rewrites relative `.md` links to the final
# `.html` URL so links between exercises don't 404 when published.
plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

# Keep the reference implementation and source out of the Pages build
# so the navigation only shows the workshop docs.
exclude:
  - solution/
  - src/
  - .venv/
  - .github/
  - Dockerfile
  - "*.py"
  - pyproject.toml
  - README.md

# Update this after creating the GitHub repository.
# url: https://<github-org-or-user>.github.io/ai-agents-workshop/

aux_links:
  "Pepsico AI Agents Workshop on GitHub":
    - "https://github.com/SinglaSandeep/ai-agents-workshop"

callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red
  tip:
    title: Tip
    color: green
  success:
    title: Success criteria
    color: green
